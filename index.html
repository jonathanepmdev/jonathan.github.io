<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1"><title>Stream en vivo — Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <meta name="description"
        content="Reacciona con nosotros. Mirá aquí la pantalla compartida y chatea en el stream oficial.">
    <style>
        :root {
            --bg: #030712;
            --bg2: #0f172a;
            --sidebar: #0b1120;
            --line: rgba(255, 255, 255, 0.08);
            --pri: #10b981;
            --ink: #f8fafc;
            --muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100vh;
            overflow: hidden;
            color: var(--ink);
            font-family: Inter, system-ui, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        /* ── Layout ── */
        .layout {
            display: flex;
            flex: 1;
            height: calc(100vh - 56px);
            overflow: hidden;
        }

        .main-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
            min-width: 0;
        }

        .chat-col {
            width: 340px;
            min-width: 340px;
            background: var(--sidebar);
            border-left: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            z-index: 5;
            transition: width 0.3s ease, min-width 0.3s ease, opacity 0.3s ease;
        }

        .chat-col.collapsed {
            width: 0;
            min-width: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* ── Player ── */
        .player-wrap {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .player-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── No stream state ── */
        .no-stream {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #030712;
            padding: 0;
            text-align: center;
            overflow: hidden;
        }

        .no-stream-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .no-stream-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 32px;
            background: linear-gradient(0deg, rgba(3, 7, 18, 0.85) 0%, transparent 50%);
        }

        .no-stream h2 {
            font-family: "Bebas Neue";
            font-size: 36px;
            color: #fff;
            letter-spacing: 2px;
            margin: 0 0 6px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
        }

        .no-stream p {
            color: var(--muted);
            font-size: 13px;
            max-width: 360px;
            line-height: 1.6;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
        }

        /* ── Header overlay ── */
        .stream-cover-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: linear-gradient(180deg, rgba(3, 7, 18, 0.95) 50%, transparent 100%);
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            pointer-events: auto;
        }

        /* Marca de agua: bloquea clicks pero sin tapar video */
        .stream-cover-watermark {
            position: absolute;
            bottom: 44px;
            right: 10px;
            width: 220px;
            height: 65px;
            background: transparent;
            z-index: 25;
            pointer-events: auto;
        }

        @media (max-width: 600px) {
            .stream-cover-watermark {
                bottom: 35px;
                width: 140px;
                height: 35px;
                right: 5px;
            }
        }

        /* ── Header elements ── */
        .stream-title {
            font-family: "Bebas Neue", sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 11px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 99px;
            color: #ef4444;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .live-indicator.offline {
            background: rgba(148, 163, 184, 0.1);
            border-color: rgba(148, 163, 184, 0.2);
            color: var(--muted);
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 8px #ef4444;
            animation: blink 1.5s infinite;
        }

        .live-indicator.offline .live-dot {
            background: var(--muted);
            box-shadow: none;
            animation: none;
        }

        /* ── Botón toggle chat ── */
        .btn-chat-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            color: rgba(255, 255, 255, 0.75);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-chat-toggle:hover {
            background: rgba(255, 255, 255, 0.13);
            color: #fff;
        }

        /* ── Chat ── */
        .chat-iframe {
            flex: 1;
            width: 100%;
            border: none;
        }

        /* ── Footer ── */
        .footer {
            height: 56px;
            background: var(--bg2);
            border-top: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 30;
            gap: 8px;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .footer-right {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .sbtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 13px;
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .sbtn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .sbtn.twitch {
            background: #9146FF;
            border-color: #9146FF;
            color: white;
            box-shadow: 0 3px 12px rgba(145, 70, 255, 0.2);
        }

        .sbtn.yt {
            background: #ff0000;
            border-color: #ff4d4d;
            color: white;
        }

        .sbtn.kick {
            background: #53fc18;
            border-color: #53fc18;
            color: #000;
            box-shadow: 0 3px 12px rgba(83, 252, 24, 0.2);
        }

        .sbtn.discord {
            background: #5865F2;
            border-color: #5865F2;
            color: white;
        }

        .sbtn.patreon {
            background: #FF424D;
            border-color: #FF424D;
            color: white;
        }

        /* ── Toast de reconexión ── */
        #reconnect-toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 99px;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        #reconnect-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.35
            }
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }

            .chat-col {
                width: 100% !important;
                min-width: 100% !important;
                height: 360px;
                border-left: none;
                border-top: 1px solid var(--line);
                transition: height 0.3s ease, opacity 0.3s ease;
            }

            .chat-col.collapsed {
                height: 0;
                min-width: unset !important;
                overflow: hidden;
                opacity: 0;
            }

            .footer-right {
                gap: 4px;
            }

            .sbtn {
                padding: 5px 10px;
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .stream-title {
                font-size: 19px;
            }
        }
    </style>
</head>

<body>
    <div class="layout">
    <!-- ── Columna principal (video) ── -->
     <div class="main-col">
        <div class="player-wrap" id="playerWrap">
            <!-- Header personalizado -->                
            <div class="stream-cover-top">
                <div class="stream-title">STREAM EN VIVO</div>
                <div class="header-right">
                    <button class="btn-chat-toggle" onclick="toggleChat()">
                        <svg width="13" height="13"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span id="chatToggleLabel">OCULTAR CHAT</span>
                    </button>
                    <div class="live-indicator" id="liveIndicator">
                        <div class="live-dot"></div>
                        <span id="liveText">DIRECTO</span>
                    </div></div>
                </div>
                <!-- Marca de agua -->
                <div class="stream-cover-watermark"></div>
                <!-- Contenedor del player -->
                 <div id="playerFrameContainer" style="width:100%;height:100%;"></div>
                </div>
            </div>
        <!-- ── Columna de chat (carga directo, sin tabs) ── -->
         <div class="chat-col" id="chatCol">
            <iframe class="chat-iframe" id="chatTwitchFrame" src="" allowfullscreen>
            </iframe>
        </div>
    </div>
        <!-- ── Footer ── -->
        <div class="footer"> 
            <div class="footer-left">

            </div> 
            <div class="footer-right">
            <!-- Agrega aquí tus links: cambia el href y la clase (yt, twitch, kick, discord, patreon) --><a
                class="sbtn yt" href="https://youtube.com/@Camilanga7" target="_blank" rel="noopener">YouTube</a>
            </div>
        </div>
    <!-- Toast -->
    <div id="reconnect-toast">Stream actualizado</div>
    
    <script>
    // ─────────────────────────────────────────────    // CONFIGURACIÓN — edita solo esta sección    // ─────────────────────────────────────────────    
        const CONFIG = {
            streamUrl: "https://www.youtube.com/embed/vGNglKWqwcQ?autoplay=1", 
            // URL del player (Kick o YouTube)      
            twitchChannel: "charlitoss", 
            // Nombre del canal de Twitch para el chat      
            twitchParent: "jonathanepmdev.github.io", 
            // Tu dominio de GitHub Pages      
            offlineImg: "" // URL de imagen cuando no hay stream (opcional)    
        };
    // ─────────────────────────────────────────────
        let chatVisible = true;
        // Toggle chat    
        function toggleChat() {
            chatVisible = !chatVisible;document.getElementById('chatCol').classList.toggle('collapsed', !chatVisible);
            document.getElementById('chatToggleLabel').textContent = chatVisible ? 'OCULTAR CHAT' : 'MOSTRAR CHAT';
        }
        // Indicador LIVE    
        function setLiveState(isLive) {
            const el = document.getElementById('liveIndicator');
            const dot = el.querySelector('.live-dot');
            const txt = document.getElementById('liveText');
            if (isLive) {
                el.classList.remove('offline');
                txt.textContent = 'DIRECTO';
                dot.style.animation = '';
            } else {
                el.classList.add('offline');
                txt.textContent = 'OFFLINE';
                dot.style.animation = 'none';
            }
        }

        // Render player    
        function renderPlayer(url) {
            document.getElementById('playerFrameContainer').innerHTML =`<iframe src="${url}" allowfullscreen allow="autoplay; fullscreen"></iframe>`;
        }

        // Imagen offline    
        function showOffline() {
            const img = CONFIG.offlineImg ? `<img class="no-stream-img" src="${CONFIG.offlineImg}" alt="Offline">` : `<div style="color:var(--muted);font-size:14px">Stream Offline</div>`;
            document.getElementById('playerFrameContainer').innerHTML = `<div class="no-stream">${img}</div>`;
        }

        // Inicializar    
        function init() {
            // Player      
            if (CONFIG.streamUrl) {
                renderPlayer(CONFIG.streamUrl);
                setLiveState(true);
            } else {
                showOffline();
                setLiveState(false);
            }

        // Chat de Twitch directo, sin tabs      
        if (CONFIG.twitchChannel && CONFIG.twitchParent) {
            document.getElementById('chatTwitchFrame').src =`https://www.twitch.tv/embed/${CONFIG.twitchChannel}/chat?darkpopout&parent=${CONFIG.twitchParent}`;
        }
    }
    
    init(); </script>
</body>

</html>
